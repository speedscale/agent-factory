$schema: https://json-schema.org/draft/2020-12/schema
title: AgentApp
description: Declarative onboarding contract for apps managed by Agent Factory.
type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    type: string
    const: agents.speedscale.io/v1alpha1
  kind:
    type: string
    const: AgentApp
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
    additionalProperties: true
  spec:
    type: object
    required:
      - repo
      - build
      - validate
    properties:
      repo:
        type: object
        required:
          - provider
          - url
          - defaultBranch
          - workdir
        properties:
          provider:
            type: string
            enum:
              - github
              - gitlab
          url:
            type: string
          defaultBranch:
            type: string
          workdir:
            type: string
        additionalProperties: false
      issue:
        type: object
        properties:
          labels:
            type: object
            properties:
              include:
                type: array
                items:
                  type: string
            additionalProperties: false
        additionalProperties: false
      quality:
        type: object
        properties:
          trigger:
            type: object
            properties:
              pullRequest:
                type: boolean
              manualRequest:
                type: boolean
              prePrRequest:
                type: boolean
            additionalProperties: false
          baseline:
            type: object
            required:
              - targets
            properties:
              strategy:
                type: string
                enum:
                  - single
                  - multi-project
              targets:
                type: array
                minItems: 1
                items:
                  type: object
                  required:
                    - name
                    - workdir
                  properties:
                    name:
                      type: string
                    workdir:
                      type: string
                    baselineRef:
                      type: string
                    command:
                      type: string
                  additionalProperties: false
            additionalProperties: false
          reporting:
            type: object
            properties:
              formats:
                type: array
                items:
                  type: string
                  enum:
                    - json
                    - markdown
              failOnRegression:
                type: boolean
              thresholds:
                type: object
                properties:
                  maxBuildStderrLineDelta:
                    type: number
                  maxValidationStderrLineDelta:
                    type: number
                additionalProperties: false
            additionalProperties: false
        additionalProperties: false
      build:
        type: object
        required:
          - install
          - test
          - start
        properties:
          install:
            type: string
          test:
            type: string
          start:
            type: string
          timeoutSeconds:
            type: number
            minimum: 1
          maxNoOutputSeconds:
            type: number
            minimum: 1
          retries:
            type: number
            minimum: 0
        additionalProperties: false
      validate:
        type: object
        required:
          - proxymock
        properties:
          proxymock:
            type: object
            required:
              - dataset
              - mode
              - command
            properties:
              dataset:
                type: string
              mode:
                type: string
              command:
                type: string
              timeoutSeconds:
                type: number
                minimum: 1
              maxNoOutputSeconds:
                type: number
                minimum: 1
              retries:
                type: number
                minimum: 0
              service:
                type: object
                required:
                  - port
                properties:
                  command:
                    type: string
                  host:
                    type: string
                  port:
                    type: number
                  startupTimeoutSeconds:
                    type: number
                additionalProperties: false
              dependencies:
                type: object
                properties:
                  setupCommand:
                    type: string
                  teardownCommand:
                    type: string
                additionalProperties: false
            additionalProperties: false
        additionalProperties: false
      policy:
        type: object
        properties:
          autoBranch:
            type: boolean
          autoMr:
            type: boolean
          autoMerge:
            type: boolean
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
