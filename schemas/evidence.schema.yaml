$schema: https://json-schema.org/draft/2020-12/schema
title: AgentEvidence
description: Structured incident evidence for run investigation and replay validation.
type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    type: string
    const: agents.speedscale.io/v1alpha1
  kind:
    type: string
    const: AgentEvidence
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
    additionalProperties: false
  spec:
    type: object
    required:
      - runRef
      - issue
      - discovery
      - capture
      - reproduction
      - replayValidation
    properties:
      runRef:
        type: object
        required:
          - name
        properties:
          name:
            type: string
        additionalProperties: false
      issue:
        type: object
        required:
          - id
          - title
        properties:
          id:
            type: string
          title:
            type: string
          url:
            type: string
        additionalProperties: false
      discovery:
        type: object
        required:
          - source
          - notes
        properties:
          source:
            type: string
            enum:
              - logs
              - speedscale-capture
              - both
              - unknown
          notes:
            type: string
        additionalProperties: false
      capture:
        type: object
        properties:
          dataset:
            type: string
          downloadCommand:
            type: string
          requestResponseSummary:
            type: string
        additionalProperties: false
      reproduction:
        type: object
        required:
          - steps
        properties:
          steps:
            type: array
            items:
              type: string
          expectedBehavior:
            type: string
          observedBehavior:
            type: string
        additionalProperties: false
      suspectedBug:
        type: string
      fixSummary:
        type: string
      replayValidation:
        type: object
        properties:
          command:
            type: string
          exitCode:
            type: number
          result:
            type: string
            enum:
              - pass
              - fail
              - pending
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
