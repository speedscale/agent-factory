$schema: https://json-schema.org/draft/2020-12/schema
title: QaIntakeEvent
description: Canonical quality validation intake payload for PR and manual requests.
type: object
required:
  - source
  - repository
  - appRef
  - request
properties:
  source:
    type: string
    enum:
      - github-webhook
      - ai-agent
      - developer
      - manual
  repository:
    type: object
    required:
      - provider
      - owner
      - name
    properties:
      provider:
        type: string
        enum:
          - github
      owner:
        type: string
        minLength: 1
      name:
        type: string
        minLength: 1
    additionalProperties: false
  appRef:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
      qualityTarget:
        type: string
        description: Optional override when app has multiple baseline targets.
    additionalProperties: false
  request:
    type: object
    required:
      - mode
    properties:
      mode:
        type: string
        enum:
          - comparison
          - baseline
      pullRequest:
        type: object
        required:
          - number
          - url
        properties:
          number:
            type: number
          url:
            type: string
            format: uri
          headSha:
            type: string
          baseSha:
            type: string
        additionalProperties: false
      branch:
        type: string
      commitSha:
        type: string
    additionalProperties: false
  requestedBy:
    type: object
    properties:
      type:
        type: string
        enum:
          - user
          - bot
          - system
      login:
        type: string
      channel:
        type: string
    additionalProperties: false
  metadata:
    type: object
    additionalProperties:
      type: string
additionalProperties: false
