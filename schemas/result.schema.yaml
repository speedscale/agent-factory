$schema: https://json-schema.org/draft/2020-12/schema
title: AgentRunResult
description: Machine-readable terminal summary of a run outcome.
type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    type: string
    const: agents.speedscale.io/v1alpha1
  kind:
    type: string
    const: AgentRunResult
  metadata:
    type: object
    required:
      - name
      - generatedAt
    properties:
      name:
        type: string
      generatedAt:
        type: string
    additionalProperties: false
  spec:
    type: object
    required:
      - runRef
      - appRef
      - issue
      - phase
      - summary
      - commands
      - artifacts
    properties:
      runRef:
        type: object
        required:
          - name
        properties:
          name:
            type: string
        additionalProperties: false
      appRef:
        type: object
        required:
          - name
        properties:
          name:
            type: string
        additionalProperties: false
      issue:
        type: object
        required:
          - id
          - title
        properties:
          id:
            type: string
          title:
            type: string
          url:
            type: string
        additionalProperties: false
      phase:
        type: string
        enum:
          - queued
          - planned
          - building
          - validating
          - succeeded
          - failed
      summary:
        type: string
      commands:
        type: object
        properties:
          build:
            type: object
            required:
              - command
              - exitCode
            properties:
              command:
                type: string
              exitCode:
                type: number
            additionalProperties: false
          validation:
            type: object
            required:
              - command
              - exitCode
            properties:
              command:
                type: string
              exitCode:
                type: number
            additionalProperties: false
        additionalProperties: false
      artifacts:
        type: object
        required:
          - run
          - result
        properties:
          run:
            type: string
          triage:
            type: string
          plan:
            type: string
          patch:
            type: string
          buildLog:
            type: string
          validationReport:
            type: string
          result:
            type: string
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
