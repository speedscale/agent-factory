$schema: https://json-schema.org/draft/2020-12/schema
title: QualityReport
description: Per-run quality comparison report against an onboarded baseline.
type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    type: string
    const: agents.speedscale.io/v1alpha1
  kind:
    type: string
    const: QualityReport
  metadata:
    type: object
    required:
      - name
      - generatedAt
    properties:
      name:
        type: string
      generatedAt:
        type: string
    additionalProperties: false
  spec:
    type: object
    required:
      - runRef
      - appRef
      - target
      - mode
      - outcome
      - summary
      - comparedCommands
    properties:
      runRef:
        type: object
        required:
          - name
        properties:
          name:
            type: string
        additionalProperties: false
      appRef:
        type: object
        required:
          - name
        properties:
          name:
            type: string
        additionalProperties: false
      target:
        type: object
        required:
          - name
          - workdir
          - baselineStorePath
        properties:
          name:
            type: string
          workdir:
            type: string
          baselineStorePath:
            type: string
        additionalProperties: false
      mode:
        type: string
        enum:
          - comparison
          - baseline
      outcome:
        type: string
        enum:
          - pass
          - warning
          - regression
      summary:
        type: string
      comparedCommands:
        type: object
        required:
          - build
        properties:
          build:
            type: object
            required:
              - currentExitCode
            properties:
              baselineExitCode:
                type: number
              currentExitCode:
                type: number
            additionalProperties: false
          validation:
            type: object
            required:
              - currentExitCode
            properties:
              baselineExitCode:
                type: number
              currentExitCode:
                type: number
            additionalProperties: false
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
