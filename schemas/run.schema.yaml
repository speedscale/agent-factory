$schema: https://json-schema.org/draft/2020-12/schema
title: AgentRun
description: A single execution of the issue-to-validate loop for a target app.
type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
  - status
properties:
  apiVersion:
    type: string
    const: agents.speedscale.io/v1alpha1
  kind:
    type: string
    const: AgentRun
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
    additionalProperties: true
  spec:
    type: object
    required:
      - appRef
      - issue
      - workspace
    properties:
      appRef:
        type: object
        required:
          - name
        properties:
          name:
            type: string
        additionalProperties: false
      request:
        type: object
        required:
          - source
          - mode
        properties:
          source:
            type: string
            enum:
              - pull_request
              - manual
              - agent
              - developer
          mode:
            type: string
            enum:
              - comparison
              - baseline
          url:
            type: string
            format: uri
          pullRequest:
            type: object
            required:
              - repository
              - number
            properties:
              repository:
                type: string
              number:
                type: number
              headSha:
                type: string
              baseSha:
                type: string
            additionalProperties: false
        additionalProperties: false
      issue:
        type: object
        required:
          - id
          - title
          - body
        properties:
          id:
            type: string
          title:
            type: string
          body:
            type: string
          url:
            type: string
        additionalProperties: false
      qualityTarget:
        type: object
        required:
          - name
          - workdir
        properties:
          name:
            type: string
          workdir:
            type: string
          baselineRef:
            type: string
        additionalProperties: false
      workspace:
        type: object
        required:
          - root
        properties:
          root:
            type: string
          branch:
            type: string
        additionalProperties: false
    additionalProperties: false
  status:
    type: object
    required:
      - phase
      - artifacts
    properties:
      phase:
        type: string
        enum:
          - queued
          - planned
          - building
          - validating
          - succeeded
          - failed
      summary:
        type: string
      lastTransitionAt:
        type: string
        format: date-time
      artifacts:
        type: object
        properties:
          evidence:
            type: string
          triage:
            type: string
          plan:
            type: string
          patch:
            type: string
          baseline:
            type: string
          buildLog:
            type: string
          validationReport:
            type: string
          qualityReportJson:
            type: string
          qualityReportMarkdown:
            type: string
          gateReport:
            type: string
          result:
            type: string
        additionalProperties: false
    additionalProperties: false
additionalProperties: false
