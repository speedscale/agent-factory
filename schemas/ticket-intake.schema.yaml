$schema: https://json-schema.org/draft/2020-12/schema
title: TicketIntakeEvent
description: Canonical event payload accepted by ticket webhook relays.
type: object
required:
  - source
  - repository
  - issue
  - appRef
properties:
  source:
    type: string
    enum:
      - github-webhook
      - slack-command
      - manual
  repository:
    type: object
    required:
      - provider
      - owner
      - name
    properties:
      provider:
        type: string
        enum:
          - github
      owner:
        type: string
        minLength: 1
      name:
        type: string
        minLength: 1
  issue:
    type: object
    required:
      - id
      - title
      - body
      - url
    properties:
      id:
        type: string
        minLength: 1
      title:
        type: string
        minLength: 1
      body:
        type: string
      url:
        type: string
        format: uri
  appRef:
    type: object
    description: Reference to onboarded app manifest known by intake.
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
  requestedBy:
    type: object
    description: Identity of the human or system that requested handling.
    properties:
      type:
        type: string
        enum:
          - user
          - bot
          - system
      login:
        type: string
      channel:
        type: string
        description: Slack channel id or GitHub installation slug.
  labels:
    type: array
    items:
      type: string
  metadata:
    type: object
    additionalProperties:
      type: string
additionalProperties: false
