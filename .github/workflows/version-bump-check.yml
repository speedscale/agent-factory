name: Version Bump Check

on:
  pull_request:

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure package.json version is bumped
        run: |
          git fetch origin "${{ github.base_ref }}"

          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:package.json" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(d).version));")
          HEAD_VERSION=$(node -p "require('./package.json').version")

          echo "base version: ${BASE_VERSION}"
          echo "head version: ${HEAD_VERSION}"

          if [ "${BASE_VERSION}" = "${HEAD_VERSION}" ]; then
            echo "ERROR: package.json version must be bumped for every PR." >&2
            exit 1
          fi
