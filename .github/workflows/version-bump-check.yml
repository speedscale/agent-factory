name: Version Bump

# The actual bump on merge to main lives in publish-image.yml, ordered
# *after* the image push so the chart appVersion never references an
# unpublished tag. This workflow only carries the PR policy notice.

on:
  pull_request:

jobs:
  version-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Version policy notice
        run: |
          echo "Version bump is CI-managed on merge to main."
          echo "Per-PR package.json bumps are not required."
