id: 003-plausible-wrong-locus
title: "Logger drops trailing newline in src/lib/logger-v2.ts:emit()"
body: |
  Every log line written by emit() in src/lib/logger-v2.ts is missing
  its trailing newline, so consecutive lines run together in journalctl.

  Expected: each call to emit() ends with exactly one "\n".
  Actual: lines concatenate with no separator.

  Acceptance criteria:
    - tail -f on stdout shows one log per line, not run-on text
    - existing test test/logger.test.ts "emits newline" passes

  Repro: run `node dist/bin/intake-api.js` and watch stdout under load.
labels: [auto-fix, bug]
expected:
  verdict: needs-info
  must_not: [dispatch]
  must_ask_for: [file_locus]
notes: |
  Well-formed SHAPE — looks like a great ticket on paper. But the named
  file `src/lib/logger-v2.ts` does not exist in this repo (the real
  logger lives at `src/lib/logger.ts` and there's no v2). A good
  triage step should ask the human to confirm the file path before
  dispatching, rather than letting the engine waste a worker run
  searching for code that isn't there. Bonus credit: catches that the
  named test file also doesn't exist.
