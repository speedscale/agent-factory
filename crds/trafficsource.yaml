apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trafficsources.agents.speedscale.io
spec:
  group: agents.speedscale.io
  scope: Namespaced
  names:
    kind: TrafficSource
    listKind: TrafficSourceList
    singular: trafficsource
    plural: trafficsources
    shortNames: [ts, trafficsrc]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Store
          type: string
          jsonPath: .spec.store.kind
        - name: Clusters
          type: string
          jsonPath: .spec.scope.clusters
        - name: DLP
          type: string
          jsonPath: .spec.dlp.profile
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [store, scope, dlp]
              properties:
                store:
                  type: object
                  required: [kind]
                  properties:
                    kind:
                      type: string
                      enum: [speedscale-cloud, speedscale-onprem, local-fs, loki, elasticsearch]
                    endpoint:
                      type: string
                    path:
                      type: string
                    logql:
                      type: string
                      description: >
                        Loki-only: full LogQL query selecting the traffic slice.
                        Overrides cluster/service scope filters when set.
                    query:
                      type: string
                      description: >
                        Elasticsearch-only: raw ES Query DSL JSON clause passed
                        to es-gather's --query flag. Overrides cluster/service
                        scope filters when set.
                    window:
                      type: string
                      description: >
                        Loki-only: time window passed to loki-gather (e.g. "-1h",
                        "-15m", or RFC3339). Defaults to "-1h" when unset.
                    auth:
                      type: object
                      required: [secretRef]
                      properties:
                        secretRef:
                          type: object
                          required: [name, key]
                          properties:
                            name: { type: string }
                            key: { type: string }
                scope:
                  type: object
                  required: [clusters]
                  properties:
                    clusters:
                      type: array
                      items: { type: string }
                    services:
                      type: array
                      items: { type: string }
                    retention:
                      type: string
                      description: "Duration string, e.g. 30d, 720h"
                    timeWindows:
                      type: array
                      items:
                        type: object
                        required: [start, end]
                        properties:
                          start: { type: string }
                          end: { type: string }
                dlp:
                  type: object
                  required: [profile]
                  properties:
                    profile:
                      type: string
                      enum: [standard, strict, none]
                    profileRef:
                      type: object
                      required: [name]
                      properties:
                        name: { type: string }
                tags:
                  type: object
                  additionalProperties: { type: string }
            status:
              type: object
              properties:
                reachable: { type: boolean }
                lastSyncTime: { type: string }
                clustersDiscovered:
                  type: array
                  items: { type: string }
                servicesDiscovered: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type: { type: string }
                      status: { type: string, enum: ["True", "False", "Unknown"] }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string }
