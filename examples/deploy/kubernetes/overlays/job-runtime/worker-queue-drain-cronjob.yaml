apiVersion: batch/v1
kind: CronJob
metadata:
  name: worker-queue-drain
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          initContainers:
            - name: create-demo-fixture
              image: ghcr.io/speedscale/agent-factory
              imagePullPolicy: IfNotPresent
              command: ["node", "dist/bin/create-demo-fixture.js"]
              volumeMounts:
                - name: agent-data
                  mountPath: /app/artifacts
                  subPath: artifacts
                - name: agent-data
                  mountPath: /app/.work
                  subPath: work
          containers:
            - name: postgres
              image: postgres:15
              imagePullPolicy: IfNotPresent
              args:
                - -c
                - port=55432
              env:
                - name: POSTGRES_DB
                  value: banking_app
                - name: POSTGRES_USER
                  value: postgres
                - name: POSTGRES_PASSWORD
                  value: password
              ports:
                - containerPort: 55432
                  name: postgres
            - name: worker
              image: ghcr.io/speedscale/agent-factory
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -lc
                - PATH="/app/.work/demo-fixture/bin:$PATH" node dist/bin/worker.js --once --poll-ms 2000 --claim-ttl-ms 900000
              env:
                - name: RUN_QUEUE_BACKEND
                  value: redis
                - name: REDIS_URL
                  value: redis://redis:6379
                - name: REDIS_QUEUE_KEY
                  value: agent-factory:runs:queued
                - name: RUN_QUEUE_BATCH_SIZE
                  value: "20"
                - name: GITHUB_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-webhook-secrets
                      key: botToken
                      optional: true
                - name: GITHUB_APP_ID
                  valueFrom:
                    secretKeyRef:
                      name: github-webhook-secrets
                      key: appId
                      optional: true
                - name: GITHUB_APP_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: github-webhook-secrets
                      key: appPrivateKey
                      optional: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              volumeMounts:
                - name: agent-data
                  mountPath: /app/artifacts
                  subPath: artifacts
                - name: agent-data
                  mountPath: /app/.work
                  subPath: work
          volumes:
            - name: agent-data
              persistentVolumeClaim:
                claimName: agent-factory-data
