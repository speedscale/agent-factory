apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake-api
spec:
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: intake-api
          env:
            - name: INTAKE_ALLOWED_REPOS
              value: speedscale/microsvc,speedscale/demo
            - name: INTAKE_REPO_APP_MAP_FILE
              value: /app/config/repo-app-map.json
            - name: INTAKE_COMMENT_ON_SKIPPED_ISSUE
              value: "true"
            - name: INTAKE_ENABLE_EMBEDDED_POLLER
              value: "true"
            - name: POLLER_INTERVAL_MS
              value: "120000"
            - name: INTAKE_TRIGGER_WORKER_JOB
              value: "true"
            - name: INTAKE_WORKER_JOB_IMAGE
              value: ghcr.io/speedscale/agent-factory:v0.1.9
            - name: INTAKE_WORKER_JOB_PVC
              value: agent-factory-data
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secrets
                  key: webhookSecret
            - name: GITHUB_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secrets
                  key: botToken
                  optional: true
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secrets
                  key: appId
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secrets
                  key: appPrivateKey
                  optional: true
          volumeMounts:
            - name: intake-repo-app-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: intake-repo-app-config
          configMap:
            name: intake-repo-app-config
