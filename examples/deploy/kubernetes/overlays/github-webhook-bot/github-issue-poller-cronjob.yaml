apiVersion: batch/v1
kind: CronJob
metadata:
  name: github-issue-poller
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: poller
              image: ghcr.io/speedscale/agent-factory:v0.1.7
              imagePullPolicy: IfNotPresent
              command:
                - node
                - dist/bin/github-issue-poller.js
                - --once
              env:
                - name: GITHUB_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: github-webhook-secrets
                      key: botToken
                      optional: true
                - name: GITHUB_APP_ID
                  valueFrom:
                    secretKeyRef:
                      name: github-webhook-secrets
                      key: appId
                      optional: true
                - name: GITHUB_APP_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: github-webhook-secrets
                      key: appPrivateKey
                      optional: true
                - name: INTAKE_ALLOWED_REPOS
                  value: speedscale/microsvc,speedscale/demo
                - name: INTAKE_REPO_APP_MAP_FILE
                  value: /app/config/repo-app-map.json
                - name: RUN_QUEUE_BACKEND
                  value: redis
                - name: REDIS_URL
                  value: redis://redis:6379
                - name: REDIS_QUEUE_KEY
                  value: agent-factory:runs:queued
                - name: POLLER_STATE_REDIS_URL
                  value: redis://redis:6379
                - name: POLLER_STATE_KEY_PREFIX
                  value: agent-factory:poller
              volumeMounts:
                - name: agent-data
                  mountPath: /app/artifacts
                  subPath: artifacts
                - name: agent-data
                  mountPath: /app/.work
                  subPath: work
                - name: intake-repo-app-config
                  mountPath: /app/config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
          volumes:
            - name: agent-data
              persistentVolumeClaim:
                claimName: agent-factory-data
            - name: intake-repo-app-config
              configMap:
                name: intake-repo-app-config
