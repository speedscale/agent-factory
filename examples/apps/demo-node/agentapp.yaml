apiVersion: agents.speedscale.io/v1alpha1
kind: AgentApp
metadata:
  name: demo-node
spec:
  repo:
    provider: github
    url: https://github.com/speedscale/demo
    defaultBranch: main
    workdir: node
  issue:
    labels:
      include:
        - agent
        - bug
  quality:
    trigger:
      pullRequest: true
      manualRequest: true
      prePrRequest: true
    baseline:
      strategy: multi-project
      targets:
        - name: demo-node
          workdir: node
          baselineRef: baseline/demo/node
          command: npm test
    reporting:
      formats:
        - json
        - markdown
      failOnRegression: true
  build:
    install: npm ci
    test: npm test
    start: npm start
  validate:
    proxymock:
      dataset: sample-node-bug
      mode: replay-with-mocks
      command: proxymock replay
  policy:
    autoBranch: true
    autoMr: false
    autoMerge: false
