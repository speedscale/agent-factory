apiVersion: agents.speedscale.io/v1alpha1
kind: AgentApp
metadata:
  name: demo-node-multi-target
spec:
  repo:
    provider: github
    url: https://github.com/speedscale/demo
    defaultBranch: main
    workdir: node
  issue:
    labels:
      include:
        - agent
        - bug
  quality:
    trigger:
      pullRequest: true
      manualRequest: true
      prePrRequest: true
    baseline:
      strategy: multi-project
      targets:
        - name: node-api
          workdir: node
          baselineRef: baseline/demo/node-api
          command: npm test
        - name: node-worker
          workdir: node
          baselineRef: baseline/demo/node-worker
          command: npm test
    reporting:
      formats:
        - json
        - markdown
      failOnRegression: true
      thresholds:
        maxBuildStderrLineDelta: 20
        maxValidationStderrLineDelta: 20
  build:
    install: npm ci
    test: npm test
    start: npm start
  validate:
    proxymock:
      dataset: demo-node-404
      mode: replay-with-mocks
      command: proxymock replay
      service:
        command: npm start
        host: 127.0.0.1
        port: 3000
        startupTimeoutSeconds: 30
  policy:
    autoBranch: true
    autoMr: true
    autoMerge: false
