apiVersion: agents.speedscale.io/v1alpha1
kind: AgentApp
metadata:
  name: outerspace-go
  namespace: agent-factory
spec:
  repo:
    provider: github
    url: https://github.com/speedscale/outerspace-go
    defaultBranch: main
    workdir: .
  trafficSources:
    - name: byoc-grafana-snapshot
      services: [outerspace-server]
  agents:
    triage:             { enabled: true,  autoCreatePR: false }
    bug-fix:            { enabled: true,  autoCreatePR: false }
    perf-investigation: { enabled: true }
    coverage-fill:      { enabled: true,  autoCreatePR: false }
    pr-replay-check:    { enabled: true,  blockMerge: false }
  scm:
    branchPrefix: "agent-factory/"
    prLabels: [agent-factory, needs-review]
