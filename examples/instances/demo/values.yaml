sizing: small

image:
  repository: ghcr.io/speedscale/agent-factory
  tag: ""

engine:
  kind: claude-sdk
  model: claude-opus-4-7
  endpoint: https://api.anthropic.com
  authSecret:
    name: anthropic-demo-key   # low-quota demo-only key
    key: token

# Guard rails: every agent runs in advisory mode, no SCM writes.
agentDefaults:
  triage:             { enabled: true,  autoCreatePR: false }
  bug-fix:            { enabled: true,  autoCreatePR: false }
  perf-investigation: { enabled: true,  autoCreatePR: false }
  coverage-fill:      { enabled: true,  autoCreatePR: false }
  pr-replay-check:    { enabled: true,  blockMerge: false }
  mock-generation:    { enabled: false }
  migration-safety:   { enabled: true,  autoCreatePR: false }

trafficSources:
  # BYOC path — pull a fresh slice from Loki at run start.
  # Update endpoint to match your Grafana stack.
  - name: byoc-grafana-snapshot
    store:
      kind: loki
      endpoint: http://loki.observability.svc.cluster.local:3100
      window: -1h
    scope:
      clusters: []               # set to your cluster name, e.g. [minikube]
      services: [outerspace-server]
    dlp:
      profile: standard
    tags:
      environment: demo
      source: grafana-byoc

  # Offline fallback — frozen fixture bundled in the container image.
  # Swap in this source when no live Loki stack is available.
  # - name: demo-snapshot
  #   store:
  #     kind: local-fs
  #     path: /app/.work/demo-fixture/snapshots/sample
  #   scope:
  #     clusters: [demo]
  #   dlp:
  #     profile: standard
  #   tags:
  #     environment: demo

intakeApi:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 250m, memory: 256Mi }

worker:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

persistence:
  enabled: true
  size: 2Gi
