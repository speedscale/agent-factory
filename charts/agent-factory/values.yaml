# Default values for agent-factory.

# Sizing profile: small | medium | ha
#   small  — 1 intake-api + 1 worker, minimal resources (dev/demo)
#   medium — 2 intake-api + 2 workers (default for internal/customer)
#   ha     — 3 intake-api + N workers, anti-affinity, PDB
sizing: medium

image:
  repository: ghcr.io/speedscale/agent-factory
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

# Engine configuration (which LLM the agents use).
engine:
  kind: claude-sdk   # claude-sdk | generic-llm | private-llm
  model: claude-opus-4-7
  endpoint: https://api.anthropic.com
  # Secret holding the API key. The chart never reads the value.
  authSecret:
    name: anthropic-api-key
    key: token

# Traffic sources to install as TrafficSource CRs at chart-apply time.
# Leave empty if applying TrafficSources out-of-band via GitOps.
trafficSources: []
#  - name: prod
#    store:
#      kind: speedscale-cloud
#      endpoint: https://cloud.speedscale.com
#      auth:
#        secretRef: { name: speedscale-api-key, key: token }
#    scope:
#      clusters: [prod]
#    dlp:
#      profile: standard

# Per-agent enablement defaults. Apps override via AgentApp.spec.agents.
agentDefaults:
  triage:             { enabled: true,  autoCreatePR: false }
  bug-fix:            { enabled: true,  autoCreatePR: true,  autoMergeThreshold: 0.85 }
  perf-investigation: { enabled: true }
  coverage-fill:      { enabled: true,  autoCreatePR: false }
  pr-replay-check:    { enabled: true,  blockMerge: true, ciTimeout: 15m }
  mock-generation:    { enabled: false }
  migration-safety:   { enabled: true }

intakeApi:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

controller:
  enabled: true
  # Empty = cluster-scoped (watch all namespaces); set to scope to one.
  watchNamespace: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

worker:
  replicas: 2
  pollIntervalMs: 2000
  claimTtlMs: 900000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

persistence:
  enabled: true
  size: 10Gi
  storageClassName: ""
  accessMode: ReadWriteOnce

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

# fsGroup matches the image's `node` user (UID/GID 1000) so PVC mounts at
# /app/artifacts and /app/.work come up writable. Without this, the worker
# pod runs as non-root but can't write its run artifacts.
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

nodeSelector: {}
tolerations: []
affinity: {}

# Prometheus Operator integration. Default off so the chart deploys on
# clusters without monitoring.coreos.com CRDs installed. Flip enabled=true
# when kube-prometheus-stack (or any operator that watches ServiceMonitor)
# is present in the cluster.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  # Override the namespace if the Prometheus instance is scoped to one
  # other than the release namespace. Empty = same namespace as the release.
  namespace: ""
  # Extra labels to add to the ServiceMonitor — Prometheus instances often
  # use a label selector (e.g. `release: kube-prometheus-stack`) to pick
  # which ServiceMonitors they scrape.
  labels: {}
