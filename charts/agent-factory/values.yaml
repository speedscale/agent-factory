# Default values for agent-factory.

# Sizing profile: small | medium | ha
#   small  — 1 intake-api + 1 worker, minimal resources (dev/demo)
#   medium — 2 intake-api + 2 workers (default for internal/customer)
#   ha     — 3 intake-api + N workers, anti-affinity, PDB
sizing: medium

image:
  repository: ghcr.io/speedscale/agent-factory
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent
  pullSecrets: []

# Engine configuration (which LLM the agents use).
#
# `kind` chooses the provider the agents call. It's mapped to the internal
# LLMProvider in `src/lib/engine-config.ts`:
#
#   claude-sdk   -> anthropic   (cloud, requires authSecret)
#   openrouter   -> openrouter  (cloud, requires authSecret)
#   ds4          -> ds4         (local DeepSeek-V4-Flash on 127.0.0.1)
#   omlx         -> omlx        (local MLX multi-model on 127.0.0.1)
#   generic-llm  -> openrouter  (alias — operator-friendly name for an
#                                OpenAI-compatible HTTP endpoint)
#   private-llm  -> openrouter  (alias — same as generic-llm)
#
# Unknown kinds throw at startup so misconfiguration is loud rather than
# silently falling back to Anthropic.
engine:
  kind: claude-sdk   # claude-sdk | openrouter | ds4 | omlx | generic-llm | private-llm
  model: claude-opus-4-7
  endpoint: https://api.anthropic.com
  # Secret holding the API key for cloud providers. The chart never reads
  # the value. Required when `kind` is claude-sdk or openrouter (or their
  # generic-llm / private-llm aliases). Local providers (ds4, omlx) don't
  # need auth — leave `name` empty and the secret mount is skipped.
  authSecret:
    name: anthropic-api-key
    key: token

# Linear integration. Used by:
#   - the Linear-issue poller (intake-api side, when POLLER_SOURCE=linear)
#   - agents that comment back on Linear tickets (worker side, triage)
# Optional: when authSecret.name is empty, the poller can't run and any
# agent that tries to post a comment will log and skip.
linear:
  authSecret:
    name: ""        # e.g. "linear-api-key"
    key: token

# Archive substrate. Where the controller writes per-AgentRun JSON
# traces and where the eval runner writes its jsonl. One interface,
# two backends:
#
#   backend: gcs   → @google-cloud/storage, bucket below, ADC creds
#   backend: local → fs/promises, path below
#   backend: ""    → falls back to gcs if bucket set, else local
#                    (with a startup WARN so we don't silently lose history)
#
# Cluster default: local at /var/lib/agent-factory/archive on a PVC.
# For Speedscale Cloud / SOS, set backend: gcs and the canonical bucket.
archive:
  backend: ""                                  # gcs | local | ""
  bucket: "ken-ai-agent-factory-archive"       # used when backend resolves to gcs
  path: "/var/lib/agent-factory/archive"       # used when backend resolves to local

# Traffic sources to install as TrafficSource CRs at chart-apply time.
# Leave empty if applying TrafficSources out-of-band via GitOps.
trafficSources: []
#  - name: prod
#    store:
#      kind: speedscale-cloud
#      endpoint: https://cloud.speedscale.com
#      auth:
#        secretRef: { name: speedscale-api-key, key: token }
#    scope:
#      clusters: [prod]
#    dlp:
#      profile: standard

# Per-agent enablement defaults. Apps override via AgentApp.spec.agents.
agentDefaults:
  triage:             { enabled: true,  autoCreatePR: false }
  bug-fix:            { enabled: true,  autoCreatePR: true,  autoMergeThreshold: 0.85 }
  perf-investigation: { enabled: true }
  coverage-fill:      { enabled: true,  autoCreatePR: false }
  pr-replay-check:    { enabled: true,  blockMerge: true, ciTimeout: 15m }
  mock-generation:    { enabled: false }
  migration-safety:   { enabled: true }

intakeApi:
  replicas: 2
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  service:
    type: ClusterIP
    port: 8080
  # OTLP gRPC receiver for streaming RRPairs from the Speedscale forwarder.
  # When enabled, intake-api listens on a second port for OTLP log exports
  # and runs windowed traffic analysis without creating cloud snapshots.
  otlp:
    enabled: false
    port: 4317
    windowMs: 60000
    maxRecordsPerService: 10000
    # Durable archive for stream findings + bug evidence (S3/Spaces).
    # bucket/endpoint/region are plain config — NOT secrets. Only the S3
    # credentials live in a Secret (secretName), with keys:
    #   access-key-id, secret-access-key
    # When bucket is empty, findings are detected but not persisted.
    archive:
      bucket: ""
      endpoint: ""
      region: us-east-1
      secretName: ""
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

controller:
  enabled: true
  # Empty = cluster-scoped (watch all namespaces); set to scope to one.
  watchNamespace: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

worker:
  # Run the worker as a second container in the intake-api pod instead of a
  # separate Deployment. The two containers share the pod's data volume, so
  # the filesystem run-queue handoff (intake-api writes run.json + enqueues,
  # worker claims + processes) works without shared external storage. Use
  # this when persistence is disabled: with emptyDir, separate pods cannot
  # see each other's queued runs and the reproduce loop silently stalls.
  # In this mode worker.replicas is ignored (the worker scales with
  # intakeApi.replicas; keep intakeApi.replicas=1 so window state and the
  # queue live in one pod).
  colocated: false
  replicas: 2
  pollIntervalMs: 2000
  claimTtlMs: 900000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  # Reproduce handler (the confirm + replicate step). Consumed by the
  # `reproduce` AgentRun the streaming pipeline enqueues for regressions.
  # The worker also mounts intakeApi.otlp.archive (as AF_TRAFFIC_ARCHIVE_*)
  # so it can fetch archived evidence back from S3 to replay.
  reproduce:
    # Full or partial URL passed to `proxymock replay --test-against`.
    # Empty = degrade to capture re-analysis (no live replay).
    replayTarget: ""
    # Linear team UUID auto-filed reproduce tickets are created under.
    # Requires linear.authSecret to also be set. Empty = confirm but don't file.
    linearTeamId: ""
    # Optional Linear label UUID attached to auto-filed reproduce tickets.
    linearLabelId: ""

persistence:
  enabled: true
  size: 10Gi
  storageClassName: ""
  accessMode: ReadWriteOnce

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

# fsGroup matches the image's `node` user (UID/GID 1000) so PVC mounts at
# /app/artifacts and /app/.work come up writable. Without this, the worker
# pod runs as non-root but can't write its run artifacts.
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

nodeSelector: {}
tolerations: []
affinity: {}

# Prometheus Operator integration. Default off so the chart deploys on
# clusters without monitoring.coreos.com CRDs installed. Flip enabled=true
# when kube-prometheus-stack (or any operator that watches ServiceMonitor)
# is present in the cluster.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  # Override the namespace if the Prometheus instance is scoped to one
  # other than the release namespace. Empty = same namespace as the release.
  namespace: ""
  # Extra labels to add to the ServiceMonitor — Prometheus instances often
  # use a label selector (e.g. `release: kube-prometheus-stack`) to pick
  # which ServiceMonitors they scrape.
  labels: {}

# Grafana dashboard ConfigMap. Default off so the chart deploys on
# clusters without Grafana. Flip enabled=true to ship the dashboard
# alongside the engine — see `dashboards/agent-factory.json` for the
# source JSON. Designed for kube-prometheus-stack's sidecar discovery
# pattern (the `grafana_dashboard: "1"` label below); operators with a
# different Grafana setup can still import the JSON via API or UI.
dashboards:
  enabled: false
  # Override the namespace if Grafana is scoped to a single namespace
  # other than the release namespace. Empty = same as release.
  namespace: ""
  # Labels for sidecar / Grafana provisioning discovery. The default
  # matches kube-prometheus-stack's sidecar config.
  labels:
    grafana_dashboard: "1"
