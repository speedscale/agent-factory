{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent-factory.fullname" . }}
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agents.speedscale.io"]
    resources: [trafficsources, agentapps, agentruns]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["agents.speedscale.io"]
    resources: [agentruns/status, agentapps/status, trafficsources/status]
    verbs: [get, update, patch]
  - apiGroups: [""]
    resources: [configmaps, secrets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent-factory.fullname" . }}
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent-factory.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-factory.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
