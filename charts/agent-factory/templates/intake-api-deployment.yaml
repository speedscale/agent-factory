apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-factory.fullname" . }}-intake-api
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: intake-api
spec:
  replicas: {{ .Values.intakeApi.replicas }}
  selector:
    matchLabels:
      {{- include "agent-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: intake-api
  template:
    metadata:
      labels:
        {{- include "agent-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: intake-api
    spec:
      serviceAccountName: {{ include "agent-factory.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: intake-api
          image: {{ include "agent-factory.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/bin/intake-api.js"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AF_ENGINE_KIND
              value: {{ .Values.engine.kind | quote }}
            - name: AF_ENGINE_MODEL
              value: {{ .Values.engine.model | quote }}
            - name: AF_ENGINE_ENDPOINT
              value: {{ .Values.engine.endpoint | quote }}
            - name: AF_ENGINE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engine.authSecret.name }}
                  key: {{ .Values.engine.authSecret.key }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.intakeApi.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - { name: agent-data, mountPath: /app/artifacts, subPath: artifacts }
            - { name: agent-data, mountPath: /app/.work,     subPath: work }
      volumes:
        - name: agent-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-factory.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
