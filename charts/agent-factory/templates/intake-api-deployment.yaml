{{- /* Fail-fast on missing auth secret for cloud providers. */ -}}
{{- include "agent-factory.assertEngineAuthSecret" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-factory.fullname" . }}-intake-api
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: intake-api
spec:
  replicas: {{ .Values.intakeApi.replicas }}
  selector:
    matchLabels:
      {{- include "agent-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: intake-api
  template:
    metadata:
      labels:
        {{- include "agent-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: intake-api
    spec:
      serviceAccountName: {{ include "agent-factory.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: intake-api
          image: {{ include "agent-factory.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/bin/intake-api.js"]
          ports:
            - name: http
              containerPort: 8080
            {{- if .Values.intakeApi.otlp.enabled }}
            - name: otlp-grpc
              containerPort: {{ .Values.intakeApi.otlp.port | default 4317 }}
            {{- end }}
          env:
            # POD_NAMESPACE via downward API. The embedded Linear poller
            # uses this as the namespace for new AgentRun CRs when
            # AF_WATCH_NAMESPACE isn't set, so CRs land in the release
            # namespace instead of "default" (where the AgentApp doesn't
            # live and the dispatcher 404s on AppRefUnresolved).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AF_ENGINE_KIND
              value: {{ .Values.engine.kind | quote }}
            - name: AF_ENGINE_MODEL
              value: {{ .Values.engine.model | quote }}
            - name: AF_ENGINE_ENDPOINT
              value: {{ .Values.engine.endpoint | quote }}
            {{- /*
              AF_ENGINE_AUTH_TOKEN is only mounted when the kind requires
              auth and a secret name is configured. Local providers (ds4,
              omlx) don't need a token.
            */ -}}
            {{- if and (eq (include "agent-factory.engineKindRequiresAuth" .) "true") .Values.engine.authSecret.name }}
            - name: AF_ENGINE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engine.authSecret.name }}
                  key: {{ .Values.engine.authSecret.key }}
            {{- end }}
            {{- /*
              intake-api LISTs AgentRuns so /metrics reflects CRD-driven runs,
              not just the filesystem queue. Scope must match the controller's
              watch scope, otherwise dashboards under-count (or surface runs
              the SA has no permission to read). Reuses the controller env var.
              Also gates the namespace the embedded Linear poller creates
              AgentRun CRs in.
            */ -}}
            {{- if .Values.controller.watchNamespace }}
            - name: AF_WATCH_NAMESPACE
              value: {{ .Values.controller.watchNamespace | quote }}
            {{- end }}
            {{- /*
              LINEAR_API_KEY for the embedded poller (POLLER_SOURCE=linear).
              Without it the poller fails fast at config-load. Mounted as
              `optional: true` so cluster-installs that haven't enabled the
              Linear path don't fail to start the pod.
            */ -}}
            {{- if .Values.linear.authSecret.name }}
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.linear.authSecret.name }}
                  key: {{ .Values.linear.authSecret.key }}
                  optional: true
            {{- end }}
            {{- if .Values.intakeApi.otlp.enabled }}
            - name: OTLP_RECEIVER_ENABLED
              value: "true"
            - name: OTLP_RECEIVER_PORT
              value: {{ .Values.intakeApi.otlp.port | default 4317 | quote }}
            - name: OTLP_WINDOW_MS
              value: {{ .Values.intakeApi.otlp.windowMs | default 60000 | quote }}
            - name: OTLP_MAX_RECORDS_PER_SERVICE
              value: {{ .Values.intakeApi.otlp.maxRecordsPerService | default 10000 | quote }}
            - name: BASELINE_DIR
              value: /app/.work/baselines
            {{- if .Values.intakeApi.otlp.archiveSecret.name }}
            - name: AF_TRAFFIC_ARCHIVE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.intakeApi.otlp.archiveSecret.name }}
                  key: bucket
            - name: AF_TRAFFIC_ARCHIVE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.intakeApi.otlp.archiveSecret.name }}
                  key: endpoint
            - name: AF_TRAFFIC_ARCHIVE_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.intakeApi.otlp.archiveSecret.name }}
                  key: region
            - name: AF_TRAFFIC_ARCHIVE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.intakeApi.otlp.archiveSecret.name }}
                  key: access-key-id
            - name: AF_TRAFFIC_ARCHIVE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.intakeApi.otlp.archiveSecret.name }}
                  key: secret-access-key
            {{- end }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.intakeApi.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - { name: agent-data, mountPath: /app/artifacts, subPath: artifacts }
            - { name: agent-data, mountPath: /app/.work,     subPath: work }
      volumes:
        - name: agent-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-factory.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
