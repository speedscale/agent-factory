{{- if .Values.controller.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-factory.fullname" . }}-controller
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  # Controller is single-replica until leader election lands.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agent-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "agent-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "agent-factory.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "agent-factory.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/bin/controller.js"]
          ports:
            - name: healthz
              containerPort: 8081
          env:
            {{- if .Values.controller.watchNamespace }}
            - name: AF_WATCH_NAMESPACE
              value: {{ .Values.controller.watchNamespace | quote }}
            {{- end }}
            - name: AF_RUN_ROOT_DIR
              value: /app/.work/runs
            - name: AF_HEALTHZ_PORT
              value: "8081"
            # Archive substrate — per-AgentRun traces and eval runs
            # both land here. See charts/agent-factory/values.yaml
            # `archive:` block and docs/EVALS.md for selection rules.
            {{- if .Values.archive }}
            {{- if .Values.archive.backend }}
            - name: AF_ARCHIVE_BACKEND
              value: {{ .Values.archive.backend | quote }}
            {{- end }}
            {{- if .Values.archive.bucket }}
            - name: AF_ARCHIVE_BUCKET
              value: {{ .Values.archive.bucket | quote }}
            {{- end }}
            {{- if .Values.archive.path }}
            - name: AF_ARCHIVE_PATH
              value: {{ .Values.archive.path | quote }}
            {{- end }}
            {{- end }}
            # The dispatch path (AgentRunWatcher → dispatchAgentRun → agent.run)
            # runs in this pod, so the agents that call Claude / post to Linear
            # need their secrets here — NOT just on the worker. ANTHROPIC_API_KEY
            # is what the Anthropic SDK reads; AF_ENGINE_AUTH_TOKEN was
            # previously mounted only on the worker, which left the
            # controller-side dispatch unable to call the LLM.
            - name: AF_ENGINE_KIND
              value: {{ .Values.engine.kind | quote }}
            - name: AF_ENGINE_MODEL
              value: {{ .Values.engine.model | quote }}
            - name: AF_ENGINE_ENDPOINT
              value: {{ .Values.engine.endpoint | quote }}
            - name: AF_ENGINE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engine.authSecret.name }}
                  key: {{ .Values.engine.authSecret.key }}
            {{- if eq .Values.engine.kind "claude-sdk" }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.engine.authSecret.name }}
                  key: {{ .Values.engine.authSecret.key }}
            {{- end }}
            # LINEAR_API_KEY lets the triage agent post the classification
            # back to the originating Linear ticket. Optional — agents log
            # and skip when unset; the run still succeeds with the verdict
            # preserved in the on-disk artifact.
            {{- if .Values.linear.authSecret.name }}
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.linear.authSecret.name }}
                  key: {{ .Values.linear.authSecret.key }}
                  optional: true
            {{- end }}
          readinessProbe:
            httpGet: { path: /readyz, port: healthz }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: healthz }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - { name: agent-data, mountPath: /app/.work, subPath: work }
      volumes:
        - name: agent-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-factory.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
