{{- if .Values.controller.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-factory.fullname" . }}-controller
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  # Controller is single-replica until leader election lands.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agent-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "agent-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "agent-factory.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "agent-factory.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/bin/controller.js"]
          ports:
            - name: healthz
              containerPort: 8081
          env:
            {{- if .Values.controller.watchNamespace }}
            - name: AF_WATCH_NAMESPACE
              value: {{ .Values.controller.watchNamespace | quote }}
            {{- end }}
            - name: AF_RUN_ROOT_DIR
              value: /app/.work/runs
            - name: AF_HEALTHZ_PORT
              value: "8081"
          readinessProbe:
            httpGet: { path: /readyz, port: healthz }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: healthz }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - { name: agent-data, mountPath: /app/.work, subPath: work }
      volumes:
        - name: agent-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-factory.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
