{{- /*
  Standalone worker Deployment. Skipped when worker.colocated=true — the
  worker then runs as a second container in the intake-api pod (see
  intake-api-deployment.yaml) so the filesystem run-queue handoff works
  over the pod-shared data volume without external shared storage.
*/ -}}
{{- if not .Values.worker.colocated }}
{{- /* Fail-fast on missing auth secret for cloud providers. */ -}}
{{- include "agent-factory.assertEngineAuthSecret" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-factory.fullname" . }}-worker
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  # The data PVC is ReadWriteOnce; an old and new pod can't both mount it
  # during a rolling update, which deadlocks the rollout. Recreate tears the
  # old pod down before starting the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agent-factory.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "agent-factory.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "agent-factory.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- include "agent-factory.workerContainer" . | nindent 8 }}
      volumes:
        - name: agent-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-factory.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
