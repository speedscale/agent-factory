apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-factory.fullname" . }}-intake-api
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
    app.kubernetes.io/component: intake-api
spec:
  type: {{ .Values.intakeApi.service.type }}
  selector:
    {{- include "agent-factory.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: intake-api
  ports:
    - name: http
      port: {{ .Values.intakeApi.service.port }}
      targetPort: http
